    _default() {

        feedbackLog: [],
        learnings: [],
        interactionCount: 0,

        proactiveInsights: []

    },
    updateProfile(mem, messages) {
      mem.interactionCount++;
      mem.userProfile.lastSeen = Date.now();
      const userMsgs = messages.filter((m) => m.role === "user").map((m) => m.content).join(" ");
      const wordCount = userMsgs.split(/\s+/).length;
      if (wordCount < 20) mem.adaptations.verbosity = Math.max(0.2, mem.adaptations.verbosity - 0.02);
      if (wordCount > 100) mem.adaptations.verbosity = Math.min(0.9, mem.adaptations.verbosity + 0.02);

      if (techTerms > 2) mem.adaptations.technicalDepth = Math.min(0.95, mem.adaptations.technicalDepth + 0.03);
      const casual = (userMsgs.match(/\b(hey|lol|gonna|wanna|btw|idk|ngl|tbh|yo|sup|bruh)\b/gi) || []).length;
      if (casual > 0) mem.adaptations.formality = Math.max(0.1, mem.adaptations.formality - 0.05);
      const topics = userMsgs.match(/\b(supply chain|logistics|resume|career|code|marketing|finance|health|map|data|legal|agent)\b/gi) || [];
      topics.forEach((t) => {
        if (!mem.userProfile.topics.includes(t.toLowerCase())) mem.userProfile.topics.push(t.toLowerCase());

      if (mem.userProfile.topics.length > 20) mem.userProfile.topics = mem.userProfile.topics.slice(-20);
      return mem;
    },
    addFeedback(mem, msgId, rating, context) {
      mem.feedbackLog.push({ msgId, rating, context, ts: Date.now() });

      if (rating === "positive") {
        mem.learnings.push({ type: "positive", context: context?.slice(0, 200), ts: Date.now() });

        mem.learnings.push({ type: "negative", context: context?.slice(0, 200), ts: Date.now() });
      }
      if (mem.learnings.length > 50) mem.learnings = mem.learnings.slice(-50);
      return mem;
    },
    addConversationSummary(mem, summary) {
      mem.conversationSummaries.push({ summary: summary.slice(0, 300), ts: Date.now() });
      if (mem.conversationSummaries.length > 30) mem.conversationSummaries = mem.conversationSummaries.slice(-30);
      return mem;
    },
    getPersonalizationContext(mem) {

      if (mem.userProfile.topics.length > 0) lines.push(`Frequent topics: ${mem.userProfile.topics.slice(-8).join(", ")}.`);
      if (mem.adaptations.verbosity < 0.35) lines.push("User prefers CONCISE responses. Be brief and direct.");
      if (mem.adaptations.verbosity > 0.7) lines.push("User prefers DETAILED responses. Be thorough and comprehensive.");
      if (mem.adaptations.technicalDepth > 0.7) lines.push("User is TECHNICAL. Use precise terminology, code examples, and architecture-level thinking.");
      if (mem.adaptations.formality < 0.3) lines.push("User communicates CASUALLY. Match their relaxed tone.");
      if (mem.conversationSummaries.length > 0) {
        const recent = mem.conversationSummaries.slice(-3).map((s) => s.summary).join(" | ");
        lines.push(`Recent conversation context: ${recent}`);
      }
      if (mem.learnings.filter((l) => l.type === "negative").length > 3) {
        lines.push("User has given negative feedback on some responses. Focus on accuracy and relevance.");
      }
      return lines.join("\n");
    }
  };
  const EmotionEngine = {
    analyze(text) {
      if (!text) return { sentiment: "neutral", confidence: 0.5, tone: "normal" };
      const lower = text.toLowerCase();
      let score = 0;
      const frustration = (lower.match(/\b(frustrated|annoying|wrong|broken|doesn't work|not working|terrible|awful|hate|ugh|wtf|fix this|useless|waste|confused|stuck|help me)\b/g) || []).length;
      score -= frustration * 2;
      const urgent = (lower.match(/\b(urgent|asap|deadline|hurry|immediately|critical|emergency|now|quick|fast)\b/g) || []).length;
      const positive = (lower.match(/\b(thanks|great|perfect|awesome|love|excellent|amazing|helpful|brilliant|wow|nice|good job|well done)\b/g) || []).length;
      score += positive * 2;
      const questions = (text.match(/\?/g) || []).length;
      const sentiment = score < -2 ? "frustrated" : score < 0 ? "negative" : score > 3 ? "enthusiastic" : score > 0 ? "positive" : "neutral";
      return {
        sentiment,
        confidence: Math.min(0.95, 0.5 + Math.abs(score) * 0.1),
        tone: urgent > 0 ? "urgent" : frustration > 2 ? "frustrated" : positive > 2 ? "appreciative" : questions > 2 ? "inquisitive" : "normal",
        urgency: urgent > 0,
        frustration: frustration > 1

      return "";
    }

    }

  function md(text) {
    if (!text) return "";
    return text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, l, c) => `<pre class="cblk" data-lang="${l || "text"}"><code>${c.replace(/</g, "&lt;")}</code></pre>`).replace(/`([^`]+)`/g, '<code class="ilc">$1</code>').replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/\*(.+?)\*/g, "<em>$1</em>").replace(/^### (.+)$/gm, "<h4>$1</h4>").replace(/^## (.+)$/gm, "<h3>$1</h3>").replace(/^# (.+)$/gm, "<h2>$1</h2>").replace(/^\d+\. (.+)$/gm, "<li class='ol'>$1</li>").replace(/^- (.+)$/gm, "<li>$1</li>").replace(/^\|(.+)\|$/gm, (m, row) => `<tr>${row.split("|").map((c) => `<td>${c.trim()}</td>`).join("")}</tr>`).replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>').replace(/\n\n/g, "</p><p>").replace(/\n/g, "<br/>");
  }
