[build]
  publish = "."
  command = "echo done"
  functions = "netlify/functions"
[functions]
  node_bundler = "esbuild"
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
[[redirects]]
  from = "/api/v1/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/create-checkout"
  status = 200
