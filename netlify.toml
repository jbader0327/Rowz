[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Enable XSS protection
    X-XSS-Protection = "1; mode=block"
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    # HSTS (force HTTPS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Permissions policy (restrict browser features)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=()"
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdnjs.cloudflare.com https://www.googletagmanager.com https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://*.arcgisonline.com; connect-src 'self' https://*.anthropic.com https://api.openai.com https://api.wheretheiss.at https://overpass-api.de https://nominatim.openstreetmap.org https://api.coingecko.com wss://stream.aisstream.io https://*.firebaseio.com https://*.googleapis.com https://wttr.in https://clob-data-api.polymarket.com https://gamma-api.polymarket.com https://fonts.googleapis.com https://fonts.gstatic.com; frame-src 'self' https://*.firebaseapp.com; object-src 'none'; base-uri 'self'; form-action 'self';"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
